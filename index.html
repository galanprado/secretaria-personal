<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Secretaria</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; }
        
        .main { display: flex; flex-direction: column; height: 100vh; }
        
        .header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 20px; text-align: center; }
        .header h1 { font-size: 24px; margin-bottom: 5px; }
        
        .tabs { display: flex; background: white; border-bottom: 1px solid #ddd; }
        .tab { flex: 1; padding: 15px; border: none; background: white; cursor: pointer; font-size: 14px; color: #666; border-bottom: 3px solid transparent; }
        .tab.active { color: #667eea; border-bottom-color: #667eea; }
        
        .content { flex: 1; overflow-y: auto; padding: 20px; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        .section { margin-bottom: 25px; }
        .section-title { font-size: 16px; font-weight: 600; margin-bottom: 12px; color: #333; }
        
        .task-item { background: white; padding: 15px; margin-bottom: 10px; border-radius: 8px; display: flex; align-items: center; gap: 12px; border-left: 4px solid #667eea; }
        .task-item.done { opacity: 0.6; border-left-color: #28a745; }
        .task-item.done .task-title { text-decoration: line-through; }
        .task-item input { width: 20px; height: 20px; cursor: pointer; }
        .task-title { flex: 1; font-size: 14px; }
        .priority { padding: 3px 8px; border-radius: 4px; font-size: 11px; white-space: nowrap; }
        .high { background: #ff6b6b; color: white; }
        .medium { background: #ffc107; color: #333; }
        .low { background: #28a745; color: white; }
        .del { background: #ff6b6b; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-size: 12px; }
        
        .meeting-item { background: white; padding: 15px; margin-bottom: 10px; border-radius: 8px; border-left: 4px solid #667eea; }
        .meeting-title { font-weight: 600; margin-bottom: 5px; }
        .meeting-info { font-size: 12px; color: #666; }
        
        .empty { color: #999; text-align: center; padding: 30px; font-style: italic; }
        
        .summary { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 15px; border-radius: 8px; margin-bottom: 20px; }
        .stat { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.2); }
        .stat:last-child { border-bottom: none; }
        
        .chat-box { display: flex; flex-direction: column; gap: 10px; }
        .messages { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; margin-bottom: 15px; min-height: 300px; }
        .msg { padding: 12px; border-radius: 12px; max-width: 80%; font-size: 14px; }
        .user-msg { align-self: flex-end; background: #667eea; color: white; }
        .bot-msg { align-self: flex-start; background: #f0f0f0; color: #333; }
        
        .input-area { display: flex; gap: 8px; }
        .input-area input { flex: 1; padding: 12px; border: 1px solid #ddd; border-radius: 20px; font-size: 14px; }
        .input-area button { width: 40px; height: 40px; background: #667eea; color: white; border: none; border-radius: 50%; cursor: pointer; font-weight: 600; }
        
        .actions { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 15px; }
        .action-btn { padding: 10px; background: white; border: 1px solid #ddd; border-radius: 6px; cursor: pointer; font-size: 12px; }
        
        .fab { position: fixed; bottom: 30px; right: 30px; width: 60px; height: 60px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; border-radius: 50%; cursor: pointer; font-size: 32px; box-shadow: 0 4px 12px rgba(102,126,234,0.4); }
    </style>
</head>
<body>
    <div class="main">
        <div class="header">
            <h1>📊 Mi Secretaria</h1>
        </div>

        <div class="tabs">
            <button class="tab active" onclick="app.switchTab('tareas')">📋 Tareas</button>
            <button class="tab" onclick="app.switchTab('reuniones')">📅 Reuniones</button>
            <button class="tab" onclick="app.switchTab('chat')">💬 Chat</button>
        </div>

        <div class="content">
            <!-- TAREAS -->
            <div id="tareas" class="tab-content active">
                <div class="summary">
                    <div class="stat"><span>Total:</span><strong id="total">0</strong></div>
                    <div class="stat"><span>Completadas:</span><strong id="completed">0</strong></div>
                    <div class="stat"><span>Pendientes:</span><strong id="pending">0</strong></div>
                </div>
                <div id="tasksList"></div>
            </div>

            <!-- REUNIONES -->
            <div id="reuniones" class="tab-content">
                <div id="meetingsList"></div>
            </div>

            <!-- CHAT -->
            <div id="chat" class="tab-content">
                <div class="actions">
                    <button class="action-btn" onclick="app.quickCmd('diario')">📋 Mi día</button>
                    <button class="action-btn" onclick="app.quickCmd('siguiente')">⏭️ Qué sigue</button>
                    <button class="action-btn" onclick="app.quickCmd('urgente')">🔴 Urgentes</button>
                    <button class="action-btn" onclick="app.quickCmd('resumen')">📝 Reuniones</button>
                </div>
                <div class="chat-box">
                    <div class="messages" id="messages"></div>
                    <div class="input-area">
                        <input type="text" id="input" placeholder="Escribe aquí..." onkeypress="if(event.key==='Enter') app.sendMsg()">
                        <button onclick="app.sendMsg()">➤</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <button class="fab" onclick="app.addNew()">+</button>

    <script>
        const app = {
            data: { tasks: [], meetings: [] },

            init() {
                this.load();
                this.render();
                this.addMsg('bot', '¡Hola! Presiona + para agregar tareas o reuniones.');
            },

            load() {
                const saved = localStorage.getItem('secretaria');
                if (saved) this.data = JSON.parse(saved);
            },

            save() {
                localStorage.setItem('secretaria', JSON.stringify(this.data));
            },

            addNew() {
                const type = prompt('1=Tarea\n2=Reunión');
                if (type === '1') {
                    const title = prompt('Título:');
                    if (title) {
                        const priority = prompt('Prioridad:\nhigh = Alto\nmedium = Medio\nlow = Bajo', 'medium');
                        this.data.tasks.push({ id: Date.now(), title, priority: priority || 'medium', done: false });
                        this.save();
                        this.render();
                    }
                } else if (type === '2') {
                    const title = prompt('Título:');
                    if (title) {
                        const time = prompt('Hora:');
                        const people = prompt('Participantes:');
                        this.data.meetings.push({ id: Date.now(), title, time, people });
                        this.save();
                        this.render();
                    }
                }
            },

            toggleTask(id) {
                const task = this.data.tasks.find(t => t.id === id);
                if (task) {
                    task.done = !task.done;
                    this.save();
                    this.render();
                }
            },

            deleteTask(id) {
                this.data.tasks = this.data.tasks.filter(t => t.id !== id);
                this.save();
                this.render();
            },

            deleteMeeting(id) {
                this.data.meetings = this.data.meetings.filter(m => m.id !== id);
                this.save();
                this.render();
            },

            render() {
                this.renderTasks();
                this.renderMeetings();
                this.updateStats();
            },

            renderTasks() {
                const html = this.data.tasks.length ? this.data.tasks.map(t => `
                    <div class="task-item ${t.done ? 'done' : ''}">
                        <input type="checkbox" ${t.done ? 'checked' : ''} onchange="app.toggleTask(${t.id})">
                        <span class="task-title">${t.title}</span>
                        <span class="priority ${t.priority}">${t.priority.toUpperCase()}</span>
                        <button class="del" onclick="app.deleteTask(${t.id})">×</button>
                    </div>
                `).join('') : '<div class="empty">Sin tareas 🎉</div>';
                document.getElementById('tasksList').innerHTML = html;
            },

            renderMeetings() {
                const html = this.data.meetings.length ? this.data.meetings.map(m => `
                    <div class="meeting-item">
                        <div class="meeting-title">${m.title}</div>
                        <div class="meeting-info">${m.time} • ${m.people}</div>
                        <button class="del" style="margin-top: 10px;" onclick="app.deleteMeeting(${m.id})">Eliminar</button>
                    </div>
                `).join('') : '<div class="empty">Sin reuniones</div>';
                document.getElementById('meetingsList').innerHTML = html;
            },

            updateStats() {
                const total = this.data.tasks.length;
                const done = this.data.tasks.filter(t => t.done).length;
                document.getElementById('total').textContent = total;
                document.getElementById('completed').textContent = done;
                document.getElementById('pending').textContent = total - done;
            },

            switchTab(tab) {
                document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
                document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
                document.getElementById(tab).classList.add('active');
                event.target.classList.add('active');
            },

            addMsg(role, text) {
                const div = document.createElement('div');
                div.className = `msg ${role === 'bot' ? 'bot-msg' : 'user-msg'}`;
                div.textContent = text;
                document.getElementById('messages').appendChild(div);
                document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
            },

            sendMsg() {
                const input = document.getElementById('input');
                const msg = input.value.trim();
                if (!msg) return;
                this.addMsg('user', msg);
                input.value = '';
                this.processMsg(msg.toLowerCase());
            },

            processMsg(msg) {
                let response = '';
                if (msg.includes('agregar') || msg.includes('tarea')) {
                    response = 'Presiona el botón + para agregar una tarea.';
                } else if (msg.includes('diario') || msg.includes('hoy')) {
                    const total = this.data.tasks.length;
                    const done = this.data.tasks.filter(t => t.done).length;
                    response = `📊 Hoy:\n${total} tareas\n${done} completadas\n${total - done} pendientes`;
                } else if (msg.includes('siguiente') || msg.includes('próximo')) {
                    const pending = this.data.tasks.filter(t => !t.done);
                    response = pending.length ? '⏭️ ' + pending.slice(0, 3).map(t => t.title).join(', ') : '✅ ¡Estás al día!';
                } else if (msg.includes('urgente')) {
                    const high = this.data.tasks.filter(t => t.priority === 'high' && !t.done);
                    response = high.length ? '🔴 ' + high.map(t => t.title).join(', ') : '✨ Sin urgentes';
                } else if (msg.includes('resumen') || msg.includes('reunión')) {
                    response = this.data.meetings.length ? '📋 ' + this.data.meetings.map(m => `${m.title} (${m.time})`).join(', ') : '📭 Sin reuniones';
                } else {
                    response = 'Puedo ayudarte con tareas, reuniones y evaluar tu día. ¿Qué necesitas?';
                }
                setTimeout(() => this.addMsg('bot', response), 300);
            },

            quickCmd(cmd) {
                const cmds = {
                    'diario': 'Evalúa mi día',
                    'siguiente': 'Qué sigue?',
                    'urgente': 'Tareas urgentes',
                    'resumen': 'Resumen de reuniones'
                };
                document.getElementById('input').value = cmds[cmd];
                this.sendMsg();
            }
        };

        app.init();
    </script>
</body>
</html>
